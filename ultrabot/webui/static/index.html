<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ultrabot</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:," />
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">&#x1F916;</span>
                    <span class="logo-text">ultrabot</span>
                </div>
                <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
                    <!-- Hamburger icon using CSS/HTML -->
                    <span></span><span></span><span></span>
                </button>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span>Chat</span>
                </a>
                <a href="#" class="nav-item" data-page="providers">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    <span>Providers</span>
                </a>
                <a href="#" class="nav-item" data-page="sessions">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                    <span>Sessions</span>
                </a>
                <a href="#" class="nav-item" data-page="tools">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                    <span>Tools</span>
                </a>
                <a href="#" class="nav-item" data-page="config">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span>Config</span>
                </a>
            </nav>

            <div class="sidebar-sessions" id="session-list">
                <div class="sidebar-section-title">Sessions</div>
                <!-- Sessions populated by JS -->
            </div>

            <div class="sidebar-footer">
                <div class="sidebar-info">ultrabot v0.1.0</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Chat Page (default) -->
            <div class="page" id="page-chat">
                <div class="page-header">
                    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h1 class="page-title">Chat</h1>
                    <div class="header-actions">
                        <button class="btn btn-ghost" id="new-session-btn" title="New session">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            New Chat
                        </button>
                        <span class="connection-status" id="connection-status" title="WebSocket disconnected">
                            <span class="status-dot disconnected"></span>
                        </span>
                    </div>
                </div>

                <div class="chat-container" id="chat-messages">
                    <div class="welcome-message" id="welcome-message">
                        <h2>Welcome to ultrabot</h2>
                        <p>Your personal AI assistant. Type a message below to get started.</p>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea class="chat-input" id="chat-input" placeholder="Type your message... (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
                        <button class="send-btn" id="send-btn" title="Send message" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Providers Page -->
            <div class="page hidden" id="page-providers">
                <div class="page-header">
                    <button class="mobile-menu-btn" aria-label="Menu">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h1 class="page-title">Providers</h1>
                    <div class="header-actions">
                        <button class="btn btn-ghost" id="refresh-providers-btn">Refresh</button>
                    </div>
                </div>
                <div class="page-content">
                    <div class="providers-grid" id="providers-grid">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>

            <!-- Sessions Page -->
            <div class="page hidden" id="page-sessions">
                <div class="page-header">
                    <button class="mobile-menu-btn" aria-label="Menu">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h1 class="page-title">Sessions</h1>
                </div>
                <div class="page-content">
                    <div class="sessions-list" id="sessions-list-page">
                        <div class="loading-spinner"></div>
                    </div>
                    <div class="session-messages-viewer hidden" id="session-messages-viewer">
                        <div class="viewer-header">
                            <button class="btn btn-ghost" id="back-to-sessions-btn">Back</button>
                            <span id="viewing-session-name"></span>
                        </div>
                        <div class="messages-list" id="session-messages-list"></div>
                    </div>
                </div>
            </div>

            <!-- Tools Page -->
            <div class="page hidden" id="page-tools">
                <div class="page-header">
                    <button class="mobile-menu-btn" aria-label="Menu">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h1 class="page-title">Tools</h1>
                </div>
                <div class="page-content">
                    <div class="tools-grid" id="tools-grid">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>

            <!-- Config Page -->
            <div class="page hidden" id="page-config">
                <div class="page-header">
                    <button class="mobile-menu-btn" aria-label="Menu">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h1 class="page-title">Configuration</h1>
                    <div class="header-actions">
                        <button class="btn btn-primary" id="save-config-btn">Save Config</button>
                    </div>
                </div>
                <div class="page-content">
                    <div class="config-editor-wrapper">
                        <textarea class="config-editor" id="config-editor" spellcheck="false"></textarea>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Modal -->
    <div class="modal-overlay hidden" id="modal-overlay">
        <div class="modal">
            <h3 class="modal-title" id="modal-title"></h3>
            <p class="modal-message" id="modal-message"></p>
            <div class="modal-actions">
                <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
                <button class="btn btn-danger" id="modal-confirm">Confirm</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
